<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탐구보고서 관리자</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, deleteDoc, doc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ══════════════════════════════════════════════
  //  🔧 index.html 과 동일한 Firebase 설정 입력
  // ══════════════════════════════════════════════
  const firebaseConfig = {
      apiKey: "AIzaSyDkjJaDSwOQEhnWU4R5LdMyMQfIqTUEGfs",
      authDomain: "report-ai-jang.firebaseapp.com",
      projectId: "report-ai-jang",
      storageBucket: "report-ai-jang.firebasestorage.app",
      messagingSenderId: "185177223457",
      appId: "1:185177223457:web:61345434d5127285f50e60",
      measurementId: "G-EDQ6NLY1KJ"
};

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  window._db = db;
  window._firestore = { collection, onSnapshot, deleteDoc, doc, getDocs, query, where };
  document.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap');
:root{
  --bg:#f5f2ec;--paper:#fefcf8;--ink:#1a1612;--ink-l:#5c5248;--ink-f:#a09890;
  --accent:#c0392b;--blue:#2c5f8a;--green:#2d7a4f;--gold:#b8860b;
  --border:#d4cfc8;--shadow:rgba(26,22,18,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* 로그인 */
#adminLogin{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--paper);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 4px 24px var(--shadow);}
.login-box h2{font-family:'Noto Serif KR',serif;font-size:1.3rem;text-align:center;margin-bottom:6px;}
.login-box p{text-align:center;font-size:0.82rem;color:var(--ink-f);margin-bottom:24px;}
.login-box input{width:100%;border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:16px;font-family:inherit;margin-bottom:12px;outline:none;}
.login-box input:focus{border-color:var(--blue);}
.login-box button{width:100%;background:var(--ink);color:#fefcf8;border:none;border-radius:8px;padding:13px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;}
.login-err{color:var(--accent);font-size:0.82rem;text-align:center;margin-top:10px;display:none;}

/* 헤더 */
header{background:var(--ink);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
header h1{font-family:'Noto Serif KR',serif;color:#fefcf8;font-size:1rem;font-weight:600;}
header h1 span{color:var(--gold);font-size:0.72rem;display:block;font-weight:300;margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.hdr-btn{background:transparent;border:1px solid rgba(254,252,248,0.4);color:#fefcf8;padding:6px 14px;border-radius:4px;font-size:0.8rem;cursor:pointer;font-family:inherit;}
.hdr-btn:hover{background:rgba(254,252,248,0.15);}
.online-dot{width:8px;height:8px;border-radius:50%;background:#2d7a4f;display:inline-block;margin-right:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* 메인 */
main{max-width:1200px;margin:0 auto;padding:24px 20px 60px;}

/* 통계 */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.stat-label{font-size:0.72rem;color:var(--ink-f);margin-bottom:6px;}
.stat-value{font-family:'Noto Serif KR',serif;font-size:1.6rem;font-weight:700;}
.stat-value span{font-size:0.82rem;font-weight:400;color:var(--ink-f);}
@media(max-width:700px){.stats{grid-template-columns:1fr 1fr;}}

/* 필터 툴바 */
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.search-box{flex:1;min-width:140px;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:0.88rem;font-family:inherit;outline:none;}
.search-box:focus{border-color:var(--blue);}
.filter-select{border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:0.82rem;font-family:inherit;color:var(--ink-l);background:var(--paper);cursor:pointer;height:36px;}
.filter-btn{background:var(--paper);border:1px solid var(--border);color:var(--ink-l);padding:7px 12px;border-radius:6px;font-size:0.8rem;cursor:pointer;font-family:inherit;}
.filter-btn.active{background:var(--ink);color:#fefcf8;border-color:var(--ink);}

/* 삭제 바 */
.delete-bar{display:none;background:#2a1410;border:1px solid var(--accent);border-radius:8px;padding:11px 16px;margin-bottom:12px;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.delete-bar.show{display:flex;}
.delete-bar-info{color:#fefcf8;font-size:0.86rem;font-weight:600;}
.btn-cancel-sel{background:transparent;border:1px solid rgba(254,252,248,0.3);color:#fefcf8;padding:6px 14px;border-radius:5px;font-size:0.8rem;cursor:pointer;font-family:inherit;}
.btn-do-delete{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:5px;font-size:0.8rem;font-weight:700;cursor:pointer;font-family:inherit;}

/* 테이블 */
.table-wrap{background:var(--paper);border:1px solid var(--border);border-radius:10px;overflow:auto;}
table{width:100%;border-collapse:collapse;min-width:800px;}
th{background:var(--ink);color:#fefcf8;padding:10px 12px;text-align:left;font-size:0.76rem;font-weight:600;letter-spacing:0.04em;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:0.83rem;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
tr.selected td{background:#fde8e8 !important;}

/* 온라인 배지 */
.badge-online{background:#d5f0e0;color:var(--green);padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:600;}
.badge-offline{background:var(--bg);color:var(--ink-f);padding:2px 8px;border-radius:10px;font-size:0.7rem;}

/* 진도 바 */
.prog-wrap{display:flex;align-items:center;gap:6px;}
.prog-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;min-width:50px;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.4s;}
.prog-text{font-size:0.72rem;color:var(--ink-l);white-space:nowrap;min-width:32px;}

/* 상태 배지 */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:600;}
.badge-done{background:#d5f0e0;color:var(--green);}
.badge-ing{background:#fef9e7;color:var(--gold);}
.badge-none{background:#fde8e8;color:var(--accent);}

/* 체크박스 */
.row-check{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);}
th.check-col,td.check-col{width:36px;text-align:center;padding:10px 6px;}

/* 버튼 */
.btn-view{background:var(--blue);color:#fff;border:none;padding:4px 10px;border-radius:4px;font-size:0.72rem;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-pdf{background:var(--accent);color:#fff;border:none;padding:4px 10px;border-radius:4px;font-size:0.72rem;cursor:pointer;font-family:inherit;white-space:nowrap;margin-left:4px;}
.btn-del-one{background:#fff;color:var(--accent);border:1px solid var(--accent);padding:4px 10px;border-radius:4px;font-size:0.72rem;cursor:pointer;font-family:inherit;white-space:nowrap;margin-left:4px;}
.btn-view:hover{background:#1e4d75;}.btn-pdf:hover{background:#a93226;}.btn-del-one:hover{background:#fde8e8;}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(26,22,18,0.5);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;backdrop-filter:blur(2px);}
.modal-bg.show{display:flex;}
.modal-box{background:var(--paper);border-radius:12px;width:100%;max-width:820px;overflow:hidden;box-shadow:0 16px 48px rgba(26,22,18,0.2);margin:auto;}
.modal-hdr{background:var(--ink);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.modal-hdr h3{font-family:'Noto Serif KR',serif;color:#fefcf8;font-size:0.95rem;}
.modal-close{background:none;border:none;color:rgba(254,252,248,0.7);font-size:1.1rem;cursor:pointer;padding:4px 8px;}
.modal-body{padding:22px;max-height:78vh;overflow-y:auto;}
.section-title{font-family:'Noto Serif KR',serif;font-size:0.85rem;font-weight:700;padding:6px 10px;background:var(--ink);color:#fefcf8;border-radius:4px;margin:16px 0 8px;letter-spacing:0.04em;}
.section-title:first-child{margin-top:0;}
.section-content{font-size:0.83rem;line-height:1.8;color:var(--ink-l);white-space:pre-wrap;padding:0 4px;}
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px;}
.info-item{background:var(--bg);border-radius:6px;padding:8px 10px;text-align:center;}
.info-item .lbl{font-size:0.68rem;color:var(--ink-f);margin-bottom:3px;}
.info-item .val{font-size:0.88rem;font-weight:600;}
.empty-msg{text-align:center;padding:36px;color:var(--ink-f);font-size:0.86rem;}
.loading-msg{text-align:center;padding:24px;color:var(--ink-f);font-size:0.86rem;}

/* 토스트 */
#adminToast{position:fixed;bottom:24px;right:20px;padding:10px 18px;border-radius:6px;font-size:0.83rem;font-family:inherit;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);max-width:300px;line-height:1.5;transition:opacity 0.3s;opacity:0;pointer-events:none;}
#adminToast.show{opacity:1;}
</style>
</head>
<body>

<div id="adminLogin">
  <div class="login-box">
    <h2>🔐 관리자 로그인</h2>
    <p>탐구보고서 관리자 페이지</p>
    <input type="password" id="adminPw" placeholder="관리자 비밀번호"
      onkeydown="if(event.key==='Enter')adminLogin()">
    <button onclick="adminLogin()">로그인</button>
    <div class="login-err" id="adminErr"></div>
  </div>
</div>

<header>
  <h1>탐구보고서 관리자<span>Teacher Dashboard</span></h1>
  <div class="hdr-right">
    <span id="onlineCount" style="font-size:0.78rem;color:rgba(254,252,248,0.7);"></span>
    <span id="hdrTime" style="font-size:0.72rem;color:rgba(254,252,248,0.45);"></span>
    <button class="hdr-btn" onclick="adminLogout()">로그아웃</button>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat-card"><div class="stat-label">전체 학생</div><div class="stat-value" id="statTotal">0<span> 명</span></div></div>
    <div class="stat-card"><div class="stat-label"><span class="online-dot"></span>현재 접속 중</div><div class="stat-value" id="statOnline" style="color:var(--green)">0<span> 명</span></div></div>
    <div class="stat-card"><div class="stat-label">완료 (80%+)</div><div class="stat-value" id="statDone" style="color:var(--green)">0<span> 명</span></div></div>
    <div class="stat-card"><div class="stat-label">작성 중</div><div class="stat-value" id="statIng" style="color:var(--gold)">0<span> 명</span></div></div>
    <div class="stat-card"><div class="stat-label">미시작</div><div class="stat-value" id="statNone" style="color:var(--accent)">0<span> 명</span></div></div>
  </div>

  <div class="delete-bar" id="deleteBar">
    <div class="delete-bar-info">🗑 <span id="selectedCount">0</span>명 선택됨 <span style="font-size:0.73rem;font-weight:400;color:#f1948a;margin-left:6px;">삭제 후 복구 불가</span></div>
    <div style="display:flex;gap:8px;">
      <button class="btn-cancel-sel" onclick="clearSelection()">취소</button>
      <button class="btn-do-delete" onclick="deleteSelected()">🗑 삭제 확인</button>
    </div>
  </div>

  <div class="toolbar">
    <input class="search-box" id="searchInput" placeholder="🔍 이름 검색..." oninput="renderTable(filterList())">
    <select class="filter-select" id="schoolFilter" onchange="renderTable(filterList())">
      <option value="">전체 학교</option>
    </select>
    <select class="filter-select" id="gradeFilter" onchange="renderTable(filterList())">
      <option value="">전체 학년</option>
      <option value="1">1학년</option>
      <option value="2">2학년</option>
      <option value="3">3학년</option>
    </select>
    <select class="filter-select" id="classFilter" onchange="renderTable(filterList())">
      <option value="">전체 반</option>
    </select>
    <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('online',this)">접속 중</button>
    <button class="filter-btn" onclick="setFilter('done',this)">완료</button>
    <button class="filter-btn" onclick="setFilter('ing',this)">진행중</button>
    <button class="filter-btn" onclick="setFilter('none',this)">미시작</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="check-col"><input type="checkbox" class="row-check" id="checkAll" onchange="toggleAllCheck(this)"></th>
          <th>학교</th>
          <th>학년</th>
          <th>반</th>
          <th>번호</th>
          <th>이름</th>
          <th>진도율</th>
          <th>상태</th>
          <th>접속</th>
          <th>마지막 저장</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="studentTable">
        <tr><td colspan="11" class="loading-msg">Firebase 연결 대기 중...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<div class="modal-bg" id="studentModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <h3 id="modalStudentName">학생 정보</h3>
      <div style="display:flex;gap:8px;align-items:center;">
        <button onclick="downloadCurrentPDF()" style="background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:4px;font-size:0.78rem;cursor:pointer;font-family:inherit;">📄 PDF</button>
        <button class="modal-close" onclick="closeStudentModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modalContent"><div class="loading-msg">불러오는 중...</div></div>
  </div>
</div>

<div id="adminToast"></div>

<script>
// ══ 관리자 비밀번호 ══
const ADMIN_PW = 'teacher1234'; // ← 변경 가능
let allStudents = [];
let currentFilter = 'all';
let selectedIds = new Set();
let currentViewStudent = null;
let _unsubscribe = null;

// ── 관리자 로그인 ──
function adminLogin() {
  const pw  = document.getElementById('adminPw').value;
  const err = document.getElementById('adminErr');
  if (pw === ADMIN_PW) {
    document.getElementById('adminLogin').style.display = 'none';
    startRealtimeListener();
    startClock();
  } else {
    err.textContent = '비밀번호가 틀렸습니다.';
    err.style.display = 'block';
  }
}
document.getElementById('adminPw').addEventListener('keydown', e => { if(e.key==='Enter') adminLogin(); });

function adminLogout() {
  if (_unsubscribe) _unsubscribe();
  location.reload();
}

// ── 실시간 학생 목록 수신 ──
function startRealtimeListener() {
  document.addEventListener('firebase-ready', () => {
    const { collection, onSnapshot } = window._firestore;
    _unsubscribe = onSnapshot(collection(window._db, 'students'), snap => {
      allStudents = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStats();
      updateSchoolClassDropdowns();
      renderTable(filterList());
    });
    showToast('실시간 연결됨 ✓', 'success');
  });
}

// ── 통계 ──
function updateStats() {
  const total   = allStudents.length;
  const online  = allStudents.filter(s => s.online).length;
  const done    = allStudents.filter(s => (s.progress||0) >= 80).length;
  const ing     = allStudents.filter(s => (s.progress||0) > 0 && (s.progress||0) < 80).length;
  const none    = allStudents.filter(s => !(s.progress||0)).length;
  document.getElementById('statTotal').innerHTML  = `${total}<span> 명</span>`;
  document.getElementById('statOnline').innerHTML = `${online}<span> 명</span>`;
  document.getElementById('statDone').innerHTML   = `${done}<span> 명</span>`;
  document.getElementById('statIng').innerHTML    = `${ing}<span> 명</span>`;
  document.getElementById('statNone').innerHTML   = `${none}<span> 명</span>`;
  document.getElementById('onlineCount').textContent = online > 0 ? `🟢 ${online}명 접속 중` : '';
}

// ── 학교·반 드롭다운 동적 생성 ──
function updateSchoolClassDropdowns() {
  const schoolSel = document.getElementById('schoolFilter');
  const classSel  = document.getElementById('classFilter');
  const curSchool = schoolSel.value;
  const curClass  = classSel.value;

  const schools = [...new Set(allStudents.map(s=>s.school).filter(Boolean))].sort();
  schoolSel.innerHTML = '<option value="">전체 학교</option>' +
    schools.map(s=>`<option value="${esc(s)}"${s===curSchool?' selected':''}>${esc(s)}</option>`).join('');

  // 반: 1~15
  classSel.innerHTML = '<option value="">전체 반</option>' +
    Array.from({length:15},(_,i)=>`<option value="${i+1}"${String(i+1)===curClass?' selected':''}>${i+1}반</option>`).join('');
}

// ── 학번 파싱 ──
function parseStudentId(sid) {
  sid = String(sid||'');
  if (sid.length < 2) return {grade:'',cls:sid,num:''};
  // 학번 형식: [학년][반][번호] 예: 10305 = 1학년 3반 5번, 103 = 1반 3번
  // 앞에서 2자리가 학년+반, 뒤 2자리가 번호
  const num = sid.slice(-2);
  const prefix = sid.slice(0, sid.length-2);
  // prefix가 2자리면 학년+반, 1자리면 반만
  const grade = prefix.length >= 2 ? prefix[0] : '';
  const cls   = prefix.length >= 2 ? prefix.slice(1) : prefix;
  return { grade, cls, num };
}

// ── 필터 ──
function filterList() {
  const q       = (document.getElementById('searchInput').value||'').toLowerCase();
  const school  = document.getElementById('schoolFilter').value;
  const grade   = document.getElementById('gradeFilter').value;
  const cls     = document.getElementById('classFilter').value;
  let list = allStudents;

  if (currentFilter === 'online') list = list.filter(s => s.online);
  else if (currentFilter === 'done') list = list.filter(s => (s.progress||0) >= 80);
  else if (currentFilter === 'ing')  list = list.filter(s => (s.progress||0) > 0 && (s.progress||0) < 80);
  else if (currentFilter === 'none') list = list.filter(s => !(s.progress||0));

  if (school) list = list.filter(s => s.school === school);
  if (cls)    list = list.filter(s => parseStudentId(s.studentId).cls === cls);
  if (grade)  list = list.filter(s => parseStudentId(s.studentId).grade === grade);
  if (q)      list = list.filter(s => (s.name||'').toLowerCase().includes(q) ||
    (s.studentId||'').includes(q) || (s.school||'').toLowerCase().includes(q));

  // 학교 → 반 → 번호 정렬
  list = [...list].sort((a,b) => {
    if ((a.school||'') !== (b.school||'')) return (a.school||'').localeCompare(b.school||'');
    const ap = parseStudentId(a.studentId), bp = parseStudentId(b.studentId);
    if (ap.cls !== bp.cls) return parseInt(ap.cls||0) - parseInt(bp.cls||0);
    return parseInt(ap.num||0) - parseInt(bp.num||0);
  });
  return list;
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(filterList());
}

// ── 테이블 렌더링 ──
function renderTable(students) {
  const tbody = document.getElementById('studentTable');
  if (!students.length) {
    tbody.innerHTML = '<tr><td colspan="11" class="empty-msg">해당하는 학생이 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = students.map(s => {
    const prog  = s.progress || 0;
    const color = prog >= 80 ? '#2d7a4f' : prog > 0 ? '#b8860b' : '#c0392b';
    const badge = prog >= 80
      ? '<span class="badge badge-done">완료</span>'
      : prog > 0
      ? '<span class="badge badge-ing">진행중</span>'
      : '<span class="badge badge-none">미시작</span>';
    const saved = s.lastSaved
      ? new Date(s.lastSaved).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
      : '—';
    const onlineBadge = s.online
      ? '<span class="badge-online">● 접속 중</span>'
      : '<span class="badge-offline">오프라인</span>';
    const { grade, cls, num } = parseStudentId(s.studentId);
    const checked = selectedIds.has(s.id) ? 'checked' : '';
    const rowSel  = selectedIds.has(s.id) ? 'class="selected"' : '';

    return `<tr ${rowSel} id="row-${s.id}">
      <td class="check-col"><input type="checkbox" class="row-check" ${checked} onchange="toggleCheck('${s.id}',this)"></td>
      <td style="font-size:0.8rem;">${esc(s.school||'')}</td>
      <td style="text-align:center;color:var(--ink-l);">${grade ? grade+'학년' : '—'}</td>
      <td style="text-align:center;font-weight:600;color:var(--blue);">${esc(cls)}반</td>
      <td style="text-align:center;color:var(--ink-l);">${parseInt(num||0)}번</td>
      <td><strong>${esc(s.name||'')}</strong></td>
      <td>
        <div class="prog-wrap">
          <div class="prog-bar"><div class="prog-fill" style="width:${prog}%;background:${color};"></div></div>
          <span class="prog-text">${prog}%</span>
        </div>
      </td>
      <td>${badge}</td>
      <td>${onlineBadge}</td>
      <td style="color:var(--ink-f);font-size:0.76rem;">${saved}</td>
      <td>
        <button class="btn-view" onclick="viewStudent('${s.id}')">보기</button>
        <button class="btn-pdf"  onclick="downloadStudentPDF('${s.id}')">PDF</button>
        <button class="btn-del-one" onclick="deleteOne('${s.id}','${esc(s.name||'')}')">삭제</button>
      </td>
    </tr>`;
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 체크박스 ──
function toggleCheck(id, el) {
  if (el.checked) selectedIds.add(id); else selectedIds.delete(id);
  updateDeleteBar();
  const row = document.getElementById(`row-${id}`);
  if (row) row.className = el.checked ? 'selected' : '';
}
function toggleAllCheck(el) {
  document.querySelectorAll('#studentTable .row-check').forEach(cb => {
    cb.checked = el.checked;
    const id = cb.closest('tr').id.replace('row-','');
    if (el.checked) selectedIds.add(id); else selectedIds.delete(id);
    const row = cb.closest('tr');
    if (row) row.className = el.checked ? 'selected' : '';
  });
  updateDeleteBar();
}
function clearSelection() {
  selectedIds.clear();
  document.querySelectorAll('.row-check').forEach(cb => cb.checked = false);
  document.querySelectorAll('tr.selected').forEach(r => r.className = '');
  const ca = document.getElementById('checkAll');
  if (ca) ca.checked = false;
  updateDeleteBar();
}
function updateDeleteBar() {
  const bar = document.getElementById('deleteBar');
  const cnt = document.getElementById('selectedCount');
  if (selectedIds.size > 0) { bar.classList.add('show'); cnt.textContent = selectedIds.size; }
  else bar.classList.remove('show');
}

// ── 학생 상세 조회 ──
function viewStudent(id) {
  const s = allStudents.find(s => s.id === id);
  if (!s) return;
  currentViewStudent = s;
  document.getElementById('modalStudentName').textContent = `${s.school||''} ${s.studentId||''} ${s.name||''}`;
  document.getElementById('studentModal').classList.add('show');

  const d = s;
  const bodies = d.bodies && d.bodies.length ? d.bodies :
    [{title:d.bodyTitle1||'본론 1',content:d.body1||''},
     {title:d.bodyTitle2||'본론 2',content:d.body2||''},
     {title:d.bodyTitle3||'본론 3',content:d.body3||''}].filter(b=>b.content);

  const { grade, cls, num } = parseStudentId(s.studentId);
  let html = `
    <div class="section-title">학생 정보</div>
    <div class="info-grid">
      <div class="info-item"><div class="lbl">학교</div><div class="val">${esc(s.school||'')}</div></div>
      <div class="info-item"><div class="lbl">학번</div><div class="val">${grade?grade+'학년 ':''}${cls}반 ${parseInt(num||0)}번</div></div>
      <div class="info-item"><div class="lbl">이름</div><div class="val">${esc(s.name||'')}</div></div>
      <div class="info-item"><div class="lbl">진도율</div><div class="val" style="color:${(s.progress||0)>=80?'var(--green)':'var(--gold)'}">${s.progress||0}%</div></div>
    </div>`;

  const sections = [
    ['탐구 제목', d.finalTitle],
    ['서론 — 목적', d.purposeText],
    ['서론 — 필요성', d.necessityText],
    ...bodies.map((b,i)=>[`본론 ${i+1}${b.title?` — ${b.title}`:''}`, b.content]),
    ['결론 요약', d.conclusionSummary||d.conclusionSummaryContent],
    ['제언', d.suggestion],
    ['느낀점', d.reflection],
    ['향상된 역량', d.competency],
    ['추후 연계 탐구주제', d.futureResearch],
    ['학생부 기재 내용', d.myRecord],
  ];

  sections.forEach(([title, text]) => {
    if (!text) return;
    html += `<div class="section-title">${esc(title)}</div><div class="section-content">${esc(text)}</div>`;
  });

  if (!d.finalTitle && !d.purposeText) html += '<div class="empty-msg">아직 작성된 내용이 없습니다.</div>';

  const saved = s.lastSaved ? new Date(s.lastSaved).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  document.getElementById('modalContent').innerHTML =
    (saved ? `<div style="text-align:right;font-size:0.72rem;color:var(--ink-f);margin-bottom:10px;">마지막 저장: ${saved}</div>` : '') + html;
}

function closeStudentModal() {
  document.getElementById('studentModal').classList.remove('show');
  currentViewStudent = null;
}
document.getElementById('studentModal').addEventListener('click', e => {
  if (e.target === document.getElementById('studentModal')) closeStudentModal();
});

// ── PDF 생성 공통 ──
async function generatePDF(s) {
  const d = s;
  const bodies = d.bodies && d.bodies.length ? d.bodies :
    [{title:d.bodyTitle1||'본론 1',content:d.body1||''},
     {title:d.bodyTitle2||'본론 2',content:d.body2||''},
     {title:d.bodyTitle3||'본론 3',content:d.body3||''}].filter(b=>b.content);

  const el = document.createElement('div');
  el.style.cssText = 'font-family:sans-serif;padding:20px;color:#1a1612;background:#fff;position:absolute;left:-9999px;width:800px;';
  el.innerHTML = `
    <div style="text-align:center;padding-bottom:14px;border-bottom:2px solid #1a1612;margin-bottom:18px;">
      <div style="font-size:0.7rem;color:#a09890;margin-bottom:5px;letter-spacing:0.08em;">RESEARCH REPORT</div>
      <div style="font-size:1.3rem;font-weight:700;margin-bottom:8px;">${esc(d.finalTitle||'(제목 없음)')}</div>
      <div style="font-size:0.82rem;color:#5c5248;">${esc(s.school||'')} · ${esc(s.studentId||'')} · ${esc(s.name||'')}</div>
    </div>
    ${rs('서론 — 탐구의 목적', d.purposeText)}
    ${rs('서론 — 탐구의 필요성', d.necessityText)}
    ${bodies.map((b,i)=>rs(`본론 ${i+1}${b.title?` — ${b.title}`:''}`, b.content)).join('')}
    ${rs('결론 요약', d.conclusionSummary||d.conclusionSummaryContent)}
    ${rs('제언', d.suggestion)}
    ${rs('느낀점 / 알게 된 점', d.reflection)}
    ${rs('향상된 역량', d.competency)}
    ${rs('추후 연계 탐구주제', d.futureResearch)}
    ${rs('학생부 기재 내용', d.myRecord)}
  `;
  document.body.appendChild(el);

  const filename = `${s.school||'학교'}_${s.studentId||''}_${s.name||'이름'}.pdf`;
  const opt = {
    margin:[12,12,12,12], filename,
    html2canvas:{scale:2,useCORS:true},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
    image:{type:'jpeg',quality:0.97}
  };

  try {
    const blob = await html2pdf().set(opt).from(el).outputPdf('blob');
    document.body.removeChild(el);
    return { blob, filename };
  } catch(e) {
    document.body.removeChild(el);
    throw e;
  }
}

function rs(title, text) {
  if (!text) return '';
  return `<div style="margin-bottom:14px;">
    <div style="font-size:0.82rem;font-weight:700;padding:4px 8px;background:#1a1612;color:#fefcf8;border-radius:3px;margin-bottom:6px;">${esc(title)}</div>
    <div style="font-size:0.82rem;line-height:1.8;white-space:pre-wrap;">${esc(text)}</div>
  </div>`;
}

// ── 개별 PDF 다운로드 ──
async function downloadStudentPDF(id) {
  const s = allStudents.find(s => s.id === id);
  if (!s) return;
  showToast('PDF 생성 중...', 'success');
  try {
    const { blob, filename } = await generatePDF(s);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 2000);
    showToast(`✅ "${filename}" 다운로드!`, 'success');
  } catch(e) {
    showToast('❌ PDF 생성 실패', 'error');
  }
}

async function downloadCurrentPDF() {
  if (!currentViewStudent) return;
  await downloadStudentPDF(currentViewStudent.id);
}

// ── 삭제 ──
async function deleteOne(id, name) {
  if (!confirm(`"${name}" 학생의 모든 데이터를 삭제할까요?\n\n삭제 후 복구할 수 없습니다.`)) return;
  const { deleteDoc, doc } = window._firestore;
  try {
    await deleteDoc(doc(window._db, 'students', id));
    selectedIds.delete(id);
    updateDeleteBar();
    showToast(`✅ ${name} 학생 데이터 삭제 완료`, 'success');
  } catch {
    showToast('❌ 삭제 실패', 'error');
  }
}

async function deleteSelected() {
  const ids   = Array.from(selectedIds);
  const names = ids.map(id => allStudents.find(s=>s.id===id)?.name||id).join(', ');
  if (!confirm(`선택한 ${ids.length}명의 데이터를 삭제할까요?\n\n대상: ${names}\n\n삭제 후 복구할 수 없습니다.`)) return;
  const { deleteDoc, doc } = window._firestore;
  let cnt = 0;
  for (const id of ids) {
    try { await deleteDoc(doc(window._db, 'students', id)); cnt++; } catch {}
  }
  selectedIds.clear();
  updateDeleteBar();
  showToast(`✅ ${cnt}명 삭제 완료`, 'success');
}

// ── 토스트 ──
function showToast(msg, type='success') {
  const t = document.getElementById('adminToast');
  t.textContent = msg;
  t.style.background = type === 'success' ? '#1a3a2a' : '#2a1410';
  t.style.color = '#fefcf8';
  t.style.borderLeft = type === 'success' ? '4px solid #2d7a4f' : '4px solid #c0392b';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── 시계 ──
function startClock() {
  const el = document.getElementById('hdrTime');
  setInterval(() => {
    el.textContent = new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  }, 1000);
}
</script>
